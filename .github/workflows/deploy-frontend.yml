name: Deploy Frontend

on:
  push:
    branches: [master]
    paths:
      - "Nexus ERP/Nexus ERP/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Nexus ERP/Nexus ERP

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: Nexus ERP/Nexus ERP/package-lock.json

      - run: npm ci

      - run: npm run build

      - run: npm install -g firebase-tools

      - run: firebase deploy --only hosting --project lumina-nexus-erp
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
