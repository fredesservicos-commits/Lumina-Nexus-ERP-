services:
  db:
    image: postgres:15
    container_name: nexus_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: nexuspassword
      POSTGRES_DB: nexus_erp
    ports:
      - "5432:5432"
    volumes:
      - nexus_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d nexus_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Nexus ERP/backend
      dockerfile: Dockerfile
    container_name: nexus_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+pg8000://admin:nexuspassword@db:5432/nexus_erp
    depends_on:
      db:
        condition: service_healthy

volumes:
  nexus_data:
