version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_erp
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://nexus:nexus_secret@db:5432/nexus_erp
      JWT_SECRET_KEY: change-this-to-a-strong-secret-in-production
    ports:
      - "8000:8000"

volumes:
  pgdata:
